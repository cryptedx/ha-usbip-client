# repository.yaml

name: "HA USB/IP Client"
url: "https://github.com/cryptedx/ha-usbip-client"
maintainer: "crypted <crypted@me.com>"
description: >
  A Home Assistant app (formerly called add-on) to act as a USB/IP client, enabling remote USB devices 
  from a USB/IP server to be accessed in Home Assistant. This app supports high availability 
  configurations and device discovery.
version: "0.3.0-beta"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
category: "Remote Access & Device Management"
logo: "https://github.com/cryptedx/ha-usbip-client/blob/main/icon.png"
documentation: "https://github.com/cryptedx/ha-usbip-client/blob/main/README.md"
license: "MIT"
