name: "HA USB/IP Client (Beta)"
description: "A USB/IP client to connect to an existing USB/IP server and access remote USB devices. ⚠️ BETA VERSION - May contain bugs and breaking changes."
version: "1.0.1-beta.2"
slug: "ha_usbip_client"
icon: "icon.png"
arch:
  - aarch64
  - amd64
startup: services
apparmor: true
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:console"
panel_title: "USB/IP"
hassio_api: true
homeassistant_api: true
hassio_role: manager
kernel_modules:
  - vhci-hcd
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Direct WebUI access
usb: true
devices:
  - /dev/vhci
privileged:
  - NET_ADMIN
  - SYS_ADMIN
  - SYS_MODULE
  - SYS_RAWIO
options:
  log_level: info
  usbipd_server_address: "192.168.1.44"
  attach_delay: 2
  monitor_interval: 30
  reattach_retries: 3
  restart_retries: 3
  notifications_enabled: true
  notification_types:
    - device_lost
    - device_recovered
    - reattach_failed
    - flap_warning
    - flap_critical
    - app_down
    - app_restarted
    - app_restart_failed
    - device_attached
    - device_detached
  dependent_apps: []
  devices:
    - name: "Aeotec Z-Stick Gen5 (ZW090) - UZB"
      device_or_bus_id: "0658:0200"
    - name: "Silicon Labs : CP210x UART Bridge"
      device_or_bus_id: "10c4:ea60"
  # Auto-scroll behavior for Logs page
  # 'when_not_paused' = scroll when logs are not paused (default)
  # 'always' = always scroll to bottom when new logs arrive or when switching to Logs tab
  log_auto_scroll: when_not_paused
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  usbipd_server_address: str
  attach_delay: "int(0,30)?"
  monitor_interval: "int(10,300)?"
  reattach_retries: "int(0,10)?"
  restart_retries: "int(0,10)?"
  notifications_enabled: "bool?"
  notification_types:
    - list(device_lost|device_recovered|reattach_failed|flap_warning|flap_critical|app_down|app_restarted|app_restart_failed|device_attached|device_detached)
  dependent_apps:
    - name: str
      slug: str
  devices:
    - name: str
      device_or_bus_id: str
      server: "str?"
  log_auto_scroll: list(when_not_paused|always)
